// Video Analytics Service — gRPC API (videoanalytics.v1)
//
// This API manages video analytics sessions over streaming or file sources (e.g. RTSP or MP4).
// Clients start a session with optional detection/matching thresholds and frame-rate limits,
// receive a session identifier, and may poll status or list sessions. Results are delivered
// asynchronously via the configured webhook URL (callback_url).

syntax = "proto3";
package videoanalytics.v1;

service VideoAnalytics {
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc GetSessionStatus(GetSessionStatusRequest) returns (SessionStatus);
  rpc RegisterFace(RegisterFaceRequest) returns (RegisterFaceResponse);
  rpc DetectFaces(DetectFacesRequest) returns (DetectFacesResponse);
}

message StartSessionRequest {
  string source_uri = 1;       // RTSP URL or MP4 file path
  string callback_url = 2;     // Webhook URL for result delivery
  string session_name = 3;     // Optional human-readable name
  SessionConfig config = 4;    // Optional per-session overrides
}

message SessionConfig {
  float confidence_threshold = 1;  // YOLO detection threshold (0 = use service default)
  float match_threshold = 2;       // Face match similarity threshold (0 = use default)
  int32 max_fps = 3;               // Frame rate limit (0 = no limit)
}

message StartSessionResponse {
  string session_id = 1;       // UUID assigned by the service
  string status = 2;           // "running" or "error"
  string error = 3;            // Error message if status == "error"
}

message StopSessionRequest {
  string session_id = 1;
}

message StopSessionResponse {
  bool success = 1;
  uint64 frames_processed = 2;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated SessionStatus sessions = 1;
}

message GetSessionStatusRequest {
  string session_id = 1;
}

message SessionStatus {
  string session_id = 1;
  string session_name = 2;
  string source_uri = 3;
  string state = 4;            // "starting", "running", "stopped", "error", "finished"
  uint64 frames_processed = 5;
  uint64 frames_dropped = 6;
  double uptime_seconds = 7;
}

message DetectFacesRequest {
  bytes image_data = 1;        // JPEG/PNG encoded image
  float confidence_threshold = 2;  // Override detection threshold (0 = use service default)
}

message DetectFacesResponse {
  bool success = 1;
  repeated FaceDetection detections = 2;
  int32 image_width = 3;      // Original image width in pixels
  int32 image_height = 4;     // Original image height in pixels
  string error = 5;            // Error message when success == false
}

message FaceDetection {
  BoundingBox bbox = 1;
  float confidence = 2;
}

message BoundingBox {
  float x1 = 1;               // Left edge x-coordinate
  float y1 = 2;               // Top edge y-coordinate
  float x2 = 3;               // Right edge x-coordinate
  float y2 = 4;               // Bottom edge y-coordinate
}

message RegisterFaceRequest {
  string name = 1;             // Person's name for the face gallery
  bytes image_data = 2;        // JPEG/PNG encoded image containing exactly one face
}

message RegisterFaceResponse {
  bool success = 1;
  int64 person_id = 2;         // Database row ID assigned to the new face
  string error = 3;            // Error message when success == false
}
